<!-- templates/password_reset_email.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reset Your Password - NDU Applications Portal</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background: #f8f9fa; padding: 30px; border-radius: 8px; border: 1px solid #ddd;">
    <h2 style="color: #0066cc; margin-bottom: 20px;">NDU Applications Portal</h2>
    
    <p>Dear {{ user.first_name }} {{ user.last_name }},</p>
    
    <p>You recently requested to reset your password.</p>
    
    <p style="text-align: center; margin: 30px 0;">
      <a href="{{ reset_url }}"
         style="display: inline-block; background: #0066cc; color: white; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 16px;">
        Reset My Password
      </a>
    </p>
    
    <p>If you did not request this reset, please ignore this email — your account remains secure.</p>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
    
    <p style="font-size: 12px; color: #777; text-align: center;">
      Ndejje University • Admissions Portal • © {{ 'now'|date:'Y' }}
    </p>
  </div>
</body>
</html>
